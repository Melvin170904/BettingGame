<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Syndicate Betting</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>The Syndicate Betting</h1>
        <p>Frontend Prototype (CST2550)</p>
    </header>

    <nav>
        <button class="nav-btn" data-section="football">Football</button>
        <button class="nav-btn" data-section="horses">Horse Racing</button>
        <button class="nav-btn" data-section="specials">Specials</button>
    </nav>

    <main>
        <section id="market-section">
            <h2>Available Bets</h2>
            <div id="market-list"></div>
        </section>

        <aside id="bet-slip">
            <h2>Bet Slip</h2>
            <div id="selected-bets"></div>

            <div id="summary">
                <label>
                    Stake (£):
                    <input type="number" id="stake-input" min="0" step="0.5" value="0">
                </label>

                <p>Total Odds: <span id="total-odds">1.00</span></p>
                <p>Potential Return: £<span id="potential-return">0.00</span></p>

                <button id="place-bet">Place Bet</button>
            </div>
        </aside>
    </main>

    <footer>
        <p>CST2550 Group Project – Frontend</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
